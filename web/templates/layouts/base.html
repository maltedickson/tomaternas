{{define "base"}}
<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/icons/line-awesome/css/line-awesome.min.css">
    <link rel="stylesheet" href="/static/icons/remix/remixicon.css">

    <script src="/static/js/main.js" defer></script>

    <link rel="stylesheet" href="/static/css/main.css">
    {{block "head" .}}{{end}}
</head>

<body>
    <div class="top-bar">
        <div class="left">
            {{block "top-left" .}}{{end}}
        </div>
        <a href="/" class="logo-link">
            <div class="logo-link__text">t</div>
            <img class="logo-link__tomato" src="/static/img/tomato.svg">
            <div class="logo-link__text">maternas</div>
        </a>
        <div class="right">
            {{block "top-right" .}}

            {{template "auth-menu" .}}

            {{end}}
        </div>
    </div>

    {{block "content" .}}{{end}}

    <a href="https://icons8.com/line-awesome" hidden>Vi använder line-awesome för ikoner!</a>
</body>

</html>
{{end}}
