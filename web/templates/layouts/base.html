{{define "base"}}
<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Besley:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prociono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Brygada+1918:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">


    <script src="/static/js/main.js" defer></script>

    <link rel="stylesheet" href="/static/css/main.css">
    {{block "head" .}}{{end}}
</head>

<body>
    {{ iconsSprite }}

    <div class="top-bar">
        <a href="/" class="top-bar__logo logo-link">
            <div class="logo-link__text">t</div>
            <img class="logo-link__tomato" src="/static/img/tomato.svg">
            <div class="logo-link__text">maternas</div>
        </a>
        <div class="top-bar__right">
            {{block "top-right" .}}

            {{if and .G.User (eq .G.User.Role "admin")}}
            <a href="/admin/dashboard" class="button">Adminpanel</a>
            {{end}}

            {{if .G.User}}
            <a href="/recipes/new" class="button">Nytt recept</a>
            {{end}}

            {{template "auth-menu" .}}

            {{end}}
        </div>
    </div>

    {{block "content" .}}{{end}}
</body>

</html>
{{end}}
