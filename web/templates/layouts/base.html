{{define "base"}}
<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <title>{{.Title}}</title>

    <link rel="stylesheet" href="/static/icons/line-awesome/css/line-awesome.min.css">

    <script src="/static/js/main.js" defer></script>

    <link rel="stylesheet" href="/static/css/main.css">
    {{block "head" .}}{{end}}
</head>

<body>
    <div class="top-bar">
        <div class="left">
            {{block "top-left" .}}{{end}}
        </div>
        <a href="/">Receptsamlingen</a>
        <div class="right">
            {{block "top-right" .}}

            {{template "auth-menu" .}}

            {{end}}
        </div>
    </div>

    {{block "content" .}}{{end}}
</body>

</html>
{{end}}
